name: Docker Build & Deploy

on:
  push:
    branches: [ "main" ]
    paths:
      - "nextjs/**"
      - "Dockerfile"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches: [ "main" ]

env:
  IMAGE_NAME: crypto-landingpage
  NAMESPACE: default
  DEPLOYMENT_NAME: crypto-landingpage

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🐳 Setup Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔐 Docker Hub login
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🏗 Build & Push image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ☸️ Setup kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # 🔑 kubeconfig
      - name: Set kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

      # 🔍 Verify cluster
      - name: Check cluster
        run: kubectl get nodes

      # 📦 Apply manifests
      - name: Apply base manifests
        run: |
          kubectl apply -n $NAMESPACE -f deploy/deployment.yaml

      # 🚀 Deploy new image
      - name: Deploy new version
        run: |
          IMAGE="${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
            ${DEPLOYMENT_NAME}=${IMAGE} \
            -n $NAMESPACE

      # ⏳ Wait rollout
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
            -n $NAMESPACE --timeout=180s

      # ❗ Verify deployment
      - name: Verify deployment
        run: |
          kubectl get deployment ${{ env.DEPLOYMENT_NAME }} -n $NAMESPACE
          kubectl get pods -l app=${{ env.DEPLOYMENT_NAME }} -n $NAMESPACE

          
